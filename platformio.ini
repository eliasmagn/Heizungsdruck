[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -DCORE_DEBUG_LEVEL=0

[env:native]
platform = native
test_framework = unity
build_src_filter =
  +<modules/PressureMath.cpp>
  +<modules/PressureStateMachine.cpp>
  +<modules/AppConfig.cpp>
  +<modules/JsonCodec.cpp>
build_flags =
  -std=gnu++17
